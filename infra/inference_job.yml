$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
type: command

display_name: predict-tomorrow-dam-prices
description: Generate next-day forecasts using the latest registered model
experiment_name: greek-dam-baseline

code: ../
command: >
  python -m scripts.predict_tomorrow
  --dam-path ${{inputs.dam_data}}
  --load-path ${{inputs.load_data}}
  --renewable-path ${{inputs.renewable_data}}
  --output-dir ${{outputs.forecasts}}
  --gate-closure-hour 12
  --model-name greek-dam-forecaster

compute: azureml:cpu-cluster-small
environment: azureml:greek-dam-training:2

inputs:
  dam_data:
    type: uri_file
    path: azureml://datastores/processed_data/paths/dam_prices/full.csv
    mode: download
  load_data:
    type: uri_file
    path: azureml://datastores/processed_data/paths/load_forecast/full.csv
    mode: download
  renewable_data:
    type: uri_file
    path: azureml://datastores/processed_data/paths/renewable_forecast/full.csv
    mode: download

outputs:
  forecasts:
    type: uri_folder
    path: azureml://datastores/curated_data/paths/forecasts/
    mode: rw_mount